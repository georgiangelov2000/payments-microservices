server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires off;
        try_files /config.js =404;
    }

    # Proxy API calls to the Application Gateway (same Docker network)
    # This avoids CORS — the browser sees everything as same-origin.
    location /api/ {
        proxy_pass         http://gateway:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

}
