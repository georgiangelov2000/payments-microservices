server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Application Gateway (same Docker network)
    # This avoids CORS — the browser sees everything as same-origin.
    location /api/ {
        proxy_pass         http://gateway:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # Simulate payment acceptance — proxies /simulate/{token}/accept
    # to http://providers:8000/payments/{token}/accept
    location /simulate/ {
        proxy_pass         http://providers:8000/payments/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }
}
