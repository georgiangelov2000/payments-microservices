name: Payments Python Quality

on:
  push:
    paths:
      - "payments/**"
      - ".github/workflows/payments-python.yml"
  pull_request:
    paths:
      - "payments/**"
      - ".github/workflows/payments-python.yml"

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: payments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            payments/requirements.txt
            payments/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Basedpyright
        run: basedpyright

      - name: Mypy
        run: mypy app

      - name: Tests
        run: pytest
