# Docker Compose configuration for development environment
services:

# Third party tools
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "15672:15672"

  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# Databases
  payments-db:
    image: postgres:15
    container_name: payments-db
    env_file:
      - payments-db/.env
    volumes:
      - ./payments-db/init-db:/docker-entrypoint-initdb.d
      - payments-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  payments-logs-db:
    image: postgres:15
    container_name: payments-logs-db
    env_file:
      - payments-logs-db/.env
    volumes:
      - ./payments-logs-db/init-db:/docker-entrypoint-initdb.d
      - payments-logs-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logs"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-admin:
    image: adminer:latest
    container_name: db-admin
    restart: unless-stopped
    ports:
      - "8084:8080"
    depends_on:
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy

# Gateways
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:80"
    depends_on:
      payments:
        condition: service_healthy

  merchant-demo:
    build: ./merchant-demo
    container_name: merchant-demo
    env_file: merchant-demo/.env
    ports:
      - "3001:80"
    depends_on:
      - gateway

  techshop-cms:
    build: ./techshop-cms
    container_name: techshop-cms
    env_file:
      - techshop-cms/.env
    ports:
      - "3002:3002"
    volumes:
      - ./techshop-cms:/app
      - techshop-cms-data:/data
    command: ["npm", "run", "dev"]
    restart: unless-stopped

  public-site:
    build: ./public-site
    container_name: public-site
    ports:
      - "8082:80"
    depends_on:
      - saas-gateway

  saas-gateway:
    image: nginx:alpine
    container_name: saas-gateway
    volumes:
      - ./saas-gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./saas-gateway/default.conf:/etc/nginx/conf.d/default.conf
      - ./saas-laravel/app/public:/var/www/public
      - ./saas-laravel/app/storage/app/public:/var/www/storage/app/public:ro
    ports:
      - "80:80"
    depends_on:
      - saas-laravel

  gateway-verification:
    build:
      context: ./gateway-verification
    container_name: gateway-verification
    env_file:
      - gateway-verification/.env
    volumes:
      - ./gateway-verification/app:/app
      - /app/node_modules
    depends_on:
      payments:
        condition: service_healthy
      payments-db:
        condition: service_healthy
      redis:
        condition: service_healthy

# SaaS platform
  saas-laravel:
    build: ./saas-laravel
    container_name: saas-laravel
    volumes:
      - ./saas-laravel/app:/var/www
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  saas-horizon:
    build: ./saas-laravel
    container_name: saas-horizon
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./saas-laravel/app:/var/www
    restart: unless-stopped
    depends_on:
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-gateway:
    image: nginx:alpine
    container_name: admin-gateway
    volumes:
      - ./admin-gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./admin-gateway/default.conf:/etc/nginx/conf.d/default.conf
      - ./admin-laravel/app/public:/var/www/public
      - ./admin-laravel/app/storage/app/public:/var/www/storage/app/public:ro
    ports:
      - "8083:80"
    depends_on:
      - admin-laravel

  admin-laravel:
    build: ./admin-laravel
    container_name: admin-laravel
    volumes:
      - ./admin-laravel/app:/var/www
    ports:
      - "8001:8000"
      - "5174:5174"
    depends_on:
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-horizon:
    build: ./admin-laravel
    container_name: admin-horizon
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./admin-laravel/app:/var/www
    restart: unless-stopped
    depends_on:
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-scheduler:
    build: ./admin-laravel
    container_name: admin-scheduler
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./admin-laravel/app:/var/www
    restart: unless-stopped
    depends_on:
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy
      redis:
        condition: service_healthy

# Payment service
  payments:
    build: ./payments
    container_name: payments
    env_file: payments/.env
    volumes:
      - ./payments:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/payments/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      rabbitmq:
        condition: service_healthy
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app

volumes:
  payments-db-data:
  payments-logs-db-data:
  techshop-cms-data:
