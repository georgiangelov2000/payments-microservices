# Docker Compose configuration for development environment
services:

# Third party tools
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "15672:15672"
  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server"]

    restart: unless-stopped

# Databases
  payments-db:
    image: postgres:15
    container_name: payments-db
    env_file:
      - payments-db/.env
    volumes:
      - ./payments-db/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments"]
      interval: 5s
      timeout: 5s
      retries: 5
  payments-logs-db:
    image: postgres:15
    container_name: payments-logs-db
    env_file:
      - payments-logs-db/.env
    volumes:
      - ./payments-logs-db/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logs"]
      interval: 5s
      timeout: 5s
      retries: 5

# Gateways
  gateway:
      build: ./gateway
      container_name: gateway
      ports:
        - "8080:80"
      depends_on:
        payments:
          condition: service_started
  merchant-demo:
    build: ./merchant-demo
    container_name: merchant-demo
    env_file: merchant-demo/.env
    ports:
      - "3001:80"
    depends_on:
      - gateway
  public-site:
    build: ./public-site
    container_name: public-site
    ports:
      - "8082:80"
    depends_on:
      - saas-gateway
  saas-gateway:
    image: nginx:alpine
    container_name: saas-gateway
    volumes:
      - ./saas-gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./saas-gateway/default.conf:/etc/nginx/conf.d/default.conf
      - ./saas-laravel/app/public:/var/www/public
    ports:
      - "80:80"
    depends_on:
      - saas-laravel
  gateway-verification:
    build:
      context: ./gateway-verification
    container_name: gateway-verification
    env_file:
      - gateway-verification/.env
    volumes:
      - ./gateway-verification/app:/app
      - /app/node_modules
    depends_on:
      payments:
        condition: service_started
      payments-db:
        condition: service_healthy
      redis:
        condition: service_started

# SaaS platform
  saas-laravel:
    build: ./saas-laravel
    container_name: saas-laravel
    volumes:
      - ./saas-laravel/app:/var/www
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      payments-db:
        condition: service_healthy

# Service
  payments:
    build: ./payments
    container_name: payments
    env_file: payments/.env
    volumes:
      - ./payments:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      payments-db:
        condition: service_healthy
      payments-logs-db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
