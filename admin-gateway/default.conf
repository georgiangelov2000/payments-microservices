server {
    listen 80;
    root /var/www/public;
    index index.html index.php;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $admin_laravel admin-laravel:9000;

    charset utf-8;

    # Restrict admin panel to localhost and Docker internal networks only.
    # In production replace these with your VPN/office IP ranges and remove
    # the 172.16.0.0/12 and 192.168.0.0/16 entries.
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log error;

    sendfile off;
    client_max_body_size 10m;

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass $admin_laravel;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_intercept_errors off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }
}
